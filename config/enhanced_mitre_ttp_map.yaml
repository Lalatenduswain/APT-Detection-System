# Confidence scoring parameters
confidence_scoring:
  base_confidence: 0.5
  max_confidence: 0.95
  min_confidence: 0.1
  
  # Factors that increase confidence
  boosters:
    multiple_techniques: 0.1  # Multiple techniques from same tactic
    apt_pattern_match: 0.15   # Matches known APT pattern
    high_severity_feature: 0.2  # Feature value > 0.9
    entity_type_match: 0.1    # Technique matches entity type
    
  # Factors that decrease confidence
  penalties:
    low_feature_value: -0.1   # Feature value < threshold + 0.1
    single_technique: -0.05   # Only one technique identified
    generic_technique: -0.05  # Very common technique

# Technique criticality levels
criticality_levels:
  critical:
    techniques: ["T1486", "T1490", "T1561", "T1485"]
    severity_boost: 2
    description: "Techniques with immediate destructive impact"
    
  high:
    techniques: ["T1110", "T1078", "T1059", "T1005", "T1041"]
    severity_boost: 1.5
    description: "Techniques indicating active compromise"
    
  medium:
    techniques: ["T1071", "T1083", "T1057", "T1082"]
    severity_boost: 1.0
    description: "Techniques indicating reconnaissance or preparation"
    
  low:
    techniques: ["T1016", "T1033", "T1124"]
    severity_boost: 0.5
    description: "Techniques with limited immediate impact"

